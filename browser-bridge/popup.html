<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
    h1 { font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 span { font-size: 18px; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 10px; background: #16213e; border-radius: 8px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.off { background: #ef4444; }
    .status-dot.checking { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 13px; flex: 1; }
    .form-group { margin-bottom: 10px; }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 7px 10px; background: #0f3460; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 13px; outline: none; }
    input[type="text"]:focus { border-color: #6c5ce7; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #6c5ce7; color: #fff; }
    .btn-primary:hover { background: #5a4bd1; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .log { margin-top: 12px; max-height: 120px; overflow-y: auto; font-size: 11px; color: #888; background: #0d1117; border-radius: 6px; padding: 8px; }
    .log-item { padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
    .log-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <h1><span>🌐</span> Airi Browser Bridge</h1>

  <div class="status-row">
    <div class="status-dot checking" id="status-dot"></div>
    <div class="status-text" id="status-text">確認中...</div>
  </div>

  <div class="form-group">
    <label>サーバーURL</label>
    <input type="text" id="server-url" placeholder="http://localhost:3001" />
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="save-btn">💾 保存</button>
    <button class="btn-secondary" id="check-btn">🔍 接続テスト</button>
  </div>

  <div class="log" id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
