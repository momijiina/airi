<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Airi Browser - 設定</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      background: #252525;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: #4a9eff;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-save {
      background: #4a9eff;
      color: #fff;
    }
    .btn-save:hover { background: #3a8eef; }
    .btn-reset {
      background: #333;
      color: #ccc;
    }
    .btn-reset:hover { background: #444; }
    .btn-panel {
      background: #2e7d32;
      color: #fff;
    }
    .btn-panel:hover { background: #388e3c; }
    .saved-msg {
      text-align: center;
      color: #4caf50;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <h2>⚙️ Airi Browser 設定</h2>

  <div class="field">
    <label>LM Studio API URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:1234/v1/chat/completions">
    <div class="info">LM Studioのサーバーが起動していることを確認してください</div>
  </div>

  <div class="field">
    <label>モデル名（必須）</label>
    <div style="display:flex;gap:6px">
      <input type="text" id="model" placeholder="下のリストから選択、または直接入力" style="flex:1">
      <button class="btn-reset" id="detectBtn" style="flex:none;width:auto;padding:8px 12px;">🔍 検出</button>
    </div>
    <select id="modelSelect" style="width:100%;margin-top:6px;background:#252525;border:1px solid #444;border-radius:6px;color:#e0e0e0;padding:6px 8px;font-size:12px;display:none;"></select>
    <div class="info" id="modelInfo">下のリストからモデルを選択して保存してください</div>
    <div class="info" style="color:#ff9800;">3B以上のモデル推奨（0.8BはJSON出力が不安定）</div>
  </div>

  <div class="field">
    <label>最大トークン数</label>
    <input type="number" id="maxTokens" placeholder="2048" min="256" max="8192">
    <div class="info">小さいモデルでは1024～2048推奨</div>
  </div>

  <div class="field">
    <label>Temperature</label>
    <input type="number" id="temperature" placeholder="0.3" min="0" max="2" step="0.1">
  </div>

  <hr>

  <div class="field">
    <label>カスタムシステムプロンプト（追加指示）</label>
    <textarea id="systemPrompt" rows="3" placeholder="例: 日本語で応答してください"></textarea>
    <div class="info">AIの動作をカスタマイズする追加の指示を記述</div>
  </div>

  <div class="btn-row">
    <button class="btn-save" id="saveBtn">💾 保存</button>
    <button class="btn-reset" id="resetBtn">↩ リセット</button>
  </div>

  <div class="btn-row">
    <button class="btn-panel" id="openPanelBtn">🤖 サイドパネルを開く</button>
  </div>

  <div class="saved-msg" id="savedMsg">✓ 設定を保存しました</div>

  <script src="popup.js"></script>
</body>
</html>
